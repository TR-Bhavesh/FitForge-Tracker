<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitForge Tracker - Your Fitness Journey Starts Here</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <h1>💪 FitForge</h1>
                <p class="tagline">Track • Transform • Triumph</p>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <h2>Welcome Back</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <label>Email or Username</label>
                        <input type="text" id="loginUsername" required placeholder="Enter your email or username">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
                <p class="toggle-form">
                    Don't have an account? <a href="#" onclick="showSignup()">Sign up</a>
                </p>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="auth-form">
                <h2>Create Account</h2>
                <form onsubmit="handleSignup(event)">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" id="signupName" required placeholder="Enter your full name">
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="signupEmail" required placeholder="Enter your email">
                    </div>
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="signupUsername" required placeholder="Choose a username">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="signupPassword" required placeholder="Create a password">
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label>Age</label>
                            <input type="number" id="signupAge" required placeholder="Age">
                        </div>
                        <div class="input-group">
                            <label>Gender</label>
                            <select id="signupGender" required>
                                <option value="">Select</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label>Height (cm)</label>
                            <input type="number" id="signupHeight" required placeholder="e.g., 175">
                        </div>
                        <div class="input-group">
                            <label>Weight (lbs)</label>
                            <input type="number" id="signupWeight" required placeholder="e.g., 180">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Sign Up</button>
                </form>
                <p class="toggle-form">
                    Already have an account? <a href="#" onclick="showLogin()">Login</a>
                </p>
            </div>

            <!-- Import Data on Login Page -->
            <div class="data-import-login">
                <p>Switching devices? <a href="#" onclick="document.getElementById('loginImportFile').click()">Import your FitForge backup</a></p>
                <input type="file" id="loginImportFile" accept=".json" style="display:none" onchange="importOnLogin(event)">
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="auth.js"></script>
</body>
</html>
